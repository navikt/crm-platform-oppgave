<template>
    <lightning-card>
        <span slot="title" class="task-card__title">Oppgaver</span>

        <div slot="actions" class="task-card__controls slds-grid slds-grid_vertical-align-center slds-gutters_small">
            <label class="task-table__option">
                <input type="checkbox" checked={ownedByRunningUser} onchange={handleMineToggle} />
                <span>Vis mine oppgaver</span>
            </label>

            <label class="task-table__option">
                <input type="radio" name="taskScope" value="open" checked={isOpenScope} onchange={handleScopeChange} />
                <span>Åpne oppgaver</span>
            </label>

            <label class="task-table__option">
                <input type="radio" name="taskScope" value="all" checked={isAllScope} onchange={handleScopeChange} />
                <span>Alle oppgaver</span>
            </label>
            <lightning-button-icon
                class="task-card__refresh"
                icon-name="utility:refresh"
                alternative-text="Oppdater"
                title="Oppdater"
                onclick={handleRefresh}
                disabled={isRefreshing}
            ></lightning-button-icon>
        </div>

        <table class="task-table">
            <thead>
                <tr>
                    <th scope="col">Oppgavetype</th>
                    <th scope="col">Tema</th>
                    <th scope="col">Gjelder</th>
                    <th scope="col">Status</th>
                    <th scope="col">Registrert</th>
                    <th scope="col">Frist</th>
                    <th scope="col">Nav enhet</th>
                </tr>
            </thead>
            <tbody>
                <template for:each={data} for:item="row">
                    <tr key={row.id}>
                        <td>
                            <a
                                href={row.oppgaveHref}
                                data-oppgaveid={row.id}
                                data-oppgavetype={row.oppgavetype}
                                onclick={handleRecordClick}
                            >
                                {row.oppgavetype}
                            </a>
                        </td>
                        <td>{row.tema}</td>
                        <td>{row.gjelder}</td>
                        <td>{row.status}</td>
                        <td>{row.registrert}</td>
                        <td>{row.frist}</td>
                        <td>{row.navEnhet}</td>
                    </tr>
                </template>
                <tr if:true={hasNoRows}>
                    <td colspan="7">Ingen oppgaver funnet</td>
                </tr>
            </tbody>
        </table>
        <div if:true={error} class="slds-text-color_error slds-p-horizontal_small slds-p-bottom_small">
            {errorMessage}
        </div>
    </lightning-card>
</template>
