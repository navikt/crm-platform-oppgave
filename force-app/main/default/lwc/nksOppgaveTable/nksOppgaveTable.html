<template>
    <lightning-card>
        <div slot="title" class="task-card__header slds-grid slds-grid_vertical-align-center slds-size_1-of-1">
            <span class="task-card__title">Oppgaver</span>

            <div class="task-card__controls slds-col_bump-left slds-grid slds-grid_vertical-align-center slds-gutters_small slds-float_right">
                <label class="task-table__option">
                    <input type="checkbox" checked={ownedByRunningUser} onchange={handleMineToggle} />
                    <span>Vis mine oppgaver</span>
                </label>

                <label class="task-table__option">
                    <input
                        type="radio"
                        name="taskScope"
                        value="open"
                        checked={isOpenScope}
                        onchange={handleScopeChange}
                    />
                    <span>Åpne oppgaver</span>
                </label>

                <label class="task-table__option">
                    <input
                        type="radio"
                        name="taskScope"
                        value="all"
                        checked={isAllScope}
                        onchange={handleScopeChange}
                    />
                    <span>Alle oppgaver</span>
                </label>
                <lightning-button-icon
                    icon-name="utility:refresh"
                    alternative-text="Oppdater"
                    title="Oppdater"
                    onclick={handleRefresh}
                    disabled={isRefreshing}
                ></lightning-button-icon>
            </div>
        </div>

        <table class="task-table">
            <thead>
                <tr>
                    <th scope="col">Oppgavetype</th>
                    <th scope="col">Tema</th>
                    <th scope="col">Gjelder</th>
                    <th scope="col">Status</th>
                    <th scope="col">Registrert</th>
                    <th scope="col">Frist</th>
                    <th scope="col">Nav enhet</th>
                </tr>
            </thead>
            <tbody>
                <template for:each={data} for:item="row">
                    <tr key={row.id}>
                        <td>
                            <a href={row.recordUrl} data-record-id={row.id} onclick={handleRecordClick}>
                                {row.oppgavetype}
                            </a>
                        </td>
                        <td>{row.tema}</td>
                        <td>{row.gjelder}</td>
                        <td>{row.status}</td>
                        <td>{row.registrert}</td>
                        <td>{row.frist}</td>
                        <td>{row.navEnhet}</td>
                    </tr>
                </template>
                <tr if:true={hasNoRows}>
                    <td colspan="7">Ingen oppgaver funnet</td>
                </tr>
            </tbody>
        </table>
        <div if:true={error} class="slds-text-color_error slds-p-horizontal_small slds-p-bottom_small">
            <p>lol</p>
            {errorMessage}
        </div>
    </lightning-card>
</template>
